quarkus.application.name=semantic-manager

# Production port allocation
quarkus.http.port=19010

# Dynamic gRPC client discovery via Consul (default)
quarkus.dynamic-grpc.consul.host=${CONSUL_HOST:consul}
quarkus.dynamic-grpc.consul.port=${CONSUL_PORT:8500}

# Development override - use localhost for Consul in dev mode
%dev.quarkus.dynamic-grpc.consul.host=localhost

# Module configuration
module.name=semantic-manager
module.type=pipestream
module.description=Stage 3 of the semantic pipeline — centroids + semantic-boundary detection over fully-embedded chunks

# Pipestream Service Registration Configuration
pipestream.server.class=module
pipestream.registration.type=MODULE
pipestream.registration.mode=grpc
pipestream.registration.description=Stage 3 of the three-step semantic pipeline; appends centroid + semantic-boundary SPRs to fully-embedded docs
pipestream.registration.capabilities=semantic-manager,centroids,semantic-boundary-detection
pipestream.registration.tags=semantic-manager,centroid,boundary,module

# Disable for tests
%test.pipestream.registration.enabled=false

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."ai.pipestream".level=DEBUG
quarkus.log.category."io.vertx.ext.consul".level=WARN
quarkus.log.category."io.quarkus.grpc".level=WARN

# File logging for diagnostic analysis
%dev.quarkus.log.file.enable=true
%dev.quarkus.log.file.path=/tmp/semantic-graph.log
%dev.quarkus.log.file.rotation.max-file-size=50M
%dev.quarkus.log.file.rotation.max-backup-index=3

# Test settings
%test.quarkus.http.port=0

# Kafka Dev Services
%dev.quarkus.kafka.devservices.enabled=true

# DJL Serving REST client (used by SemanticGraphEmbedHelper for boundary re-embed
# per DESIGN.md §7.3 step 5). The configKey "djl-serving" matches the local
# DjlServingClient interface in the .djl package; same key is used by the
# embedder repo's quarkus-djl-embeddings extension so when that artifact
# publishes, the local interface deletes cleanly without touching properties.
# Port 18090 is the module-semantic-graph convention for its test/dev DJL
# Serving instance — picked to avoid the 18080 collision with SeaweedFS in
# the platform's docker-compose stack. Override per environment via
# EMBEDDER_DJL_SERVING_URL — same env var the module-embedder uses for
# its own DJL endpoint so one operator setting covers both modules
# (which both call the same DJL Serving instance in production).
quarkus.rest-client.djl-serving.url=${EMBEDDER_DJL_SERVING_URL:http://localhost:18090}
quarkus.rest-client.djl-serving.connect-timeout=${PIPESTREAM_DJL_CONNECT_TIMEOUT_MS:5000}
quarkus.rest-client.djl-serving.read-timeout=${PIPESTREAM_DJL_READ_TIMEOUT_MS:30000}

# Caffeine cache for DjlServingClient.listModels() probes — cadence matches
# pipestream-embedder-djl's DjlModelRegistry scheduled refresh (30s default) so
# per-doc isModelLoaded checks don't hammer DJL Serving's management endpoint.
quarkus.cache.caffeine."djl-models-loaded".expire-after-write=30s
quarkus.cache.caffeine."djl-models-loaded".maximum-size=256

%dev.quarkus.http.port=19110

# HTTP/2 max concurrent streams per connection. Default is 100.
# With a single engine->module gRPC channel, that caps concurrent doc
# dispatches to 100. Under burst load we want many more in flight.
quarkus.http.http2.max-concurrent-streams=2000
