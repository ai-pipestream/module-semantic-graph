quarkus.application.name=semantic-manager

# Production port allocation
quarkus.http.port=19010

# Context path
quarkus.http.root-path=/modules/semantic-manager

# gRPC Client for opensearch-manager (VectorSetService)
quarkus.grpc.clients.opensearch-manager.host=opensearch-manager
quarkus.grpc.clients.opensearch-manager.name-resolver=stork

# gRPC Client for chunker services via Stork/Consul
quarkus.grpc.clients.chunker-service.host=chunker
quarkus.grpc.clients.chunker-service.name-resolver=stork

# gRPC Client for embedder services via Stork/Consul
quarkus.grpc.clients.embedder-service.host=embedder
quarkus.grpc.clients.embedder-service.name-resolver=stork

# gRPC Client for registration service
quarkus.grpc.clients.registration-service.host=registration-service
quarkus.grpc.clients.registration-service.name-resolver=stork

# gRPC Client for platform registration service
quarkus.grpc.clients.platform-registration-service.host=platform-registration
quarkus.grpc.clients.platform-registration-service.name-resolver=stork

# Stork service discovery configuration
quarkus.stork.opensearch-manager.service-discovery.type=consul
quarkus.stork.opensearch-manager.service-discovery.consul-host=${CONSUL_HOST:consul}
quarkus.stork.opensearch-manager.service-discovery.consul-port=${CONSUL_PORT:8500}

quarkus.stork.chunker-service.service-discovery.type=consul
quarkus.stork.chunker-service.service-discovery.consul-host=${CONSUL_HOST:consul}
quarkus.stork.chunker-service.service-discovery.consul-port=${CONSUL_PORT:8500}

quarkus.stork.embedder-service.service-discovery.type=consul
quarkus.stork.embedder-service.service-discovery.consul-host=${CONSUL_HOST:consul}
quarkus.stork.embedder-service.service-discovery.consul-port=${CONSUL_PORT:8500}

quarkus.stork.registration-service.service-discovery.type=consul
quarkus.stork.registration-service.service-discovery.consul-host=${CONSUL_HOST:consul}
quarkus.stork.registration-service.service-discovery.consul-port=${CONSUL_PORT:8500}

quarkus.stork.platform-registration-service.service-discovery.type=consul
quarkus.stork.platform-registration-service.service-discovery.consul-host=${CONSUL_HOST:consul}
quarkus.stork.platform-registration-service.service-discovery.consul-port=${CONSUL_PORT:8500}

# Development override - use localhost for Consul in dev mode
%dev.quarkus.stork.opensearch-manager.service-discovery.consul-host=localhost
%dev.quarkus.stork.chunker-service.service-discovery.consul-host=localhost
%dev.quarkus.stork.embedder-service.service-discovery.consul-host=localhost
%dev.quarkus.stork.registration-service.service-discovery.consul-host=localhost
%dev.quarkus.stork.platform-registration-service.service-discovery.consul-host=localhost

# Module configuration
module.name=semantic-manager
module.type=pipestream
module.description=Semantic indexing coordinator that multiplexes chunking and embedding

# Pipestream Service Registration Configuration
pipestream.server.class=module
pipestream.registration.type=MODULE
pipestream.registration.mode=grpc
pipestream.registration.description=Semantic indexing coordinator - fans out to chunker and embedder services
pipestream.registration.capabilities=semantic-indexing,orchestration,multiplexing
pipestream.registration.tags=semantic-manager,orchestrator,module

# Disable for tests
%test.pipestream.registration.enabled=false

# Semantic manager specific configuration
semantic-manager.default-index-name=${SEMANTIC_MANAGER_INDEX:default-index}
semantic-manager.max-concurrent-chunkers=${SEMANTIC_MANAGER_MAX_CHUNKERS:4}
semantic-manager.max-concurrent-embedders=${SEMANTIC_MANAGER_MAX_EMBEDDERS:8}

# gRPC deadline for streaming operations (10 minutes)
quarkus.grpc.clients.chunker-service.deadline=600000
quarkus.grpc.clients.embedder-service.deadline=600000

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."ai.pipestream".level=DEBUG
quarkus.log.category."io.vertx.ext.consul".level=WARN
quarkus.log.category."io.quarkus.grpc".level=WARN

# Test settings
%test.quarkus.http.port=0

# Kafka Dev Services
%dev.quarkus.kafka.devservices.enabled=true
